services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - checkpoints-data:/app/checkpoints
    networks:
      - geoseg-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - geoseg-network

volumes:
  checkpoints-data:

networks:
  geoseg-network:
    driver: bridge
