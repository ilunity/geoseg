server {
    listen 80;

    # Фронтенд — всё что не /api
    location / {
        proxy_pass http://frontend:80;   # для prod-сборки
        # proxy_pass http://frontend:5173;  # для dev-варианта
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Бэкенд — запросы на /api/...
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Для WebSocket (если используешь)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}